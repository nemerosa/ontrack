query NotificationRecords(
    $channel: String,
    $eventEntityType: ProjectEntityType = null,
    $eventEntityId: Int = null,
) {
    notificationRecords(
        channel: $channel,
        eventEntityType: $eventEntityType,
        eventEntityId: $eventEntityId,
    ) {
        pageItems {
            id
            source {
                id
                data
            }
            timestamp
            channel
            channelConfig
            event
            result {
                type
                message
                output
            }
        }
    }
}