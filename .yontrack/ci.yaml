version: v1
configuration:
  defaults:
    branch:
      autoVersioning:
        configurations: []
      validations:
        BUILD:
          tests: {}
        UI_UNIT:
          tests: {}
        KDSL.ACCEPTANCE:
          tests: {}
        PLAYWRIGHT:
          tests: {}
        DOCUMENTATION: {}
      promotions:
        BRONZE:
          validations:
            - BUILD
            - UI_UNIT
            - KDSL.ACCEPTANCE
            - PLAYWRIGHT
        RELEASE:
          promotions:
            - BRONZE
          validations:
            - GITHUB.RELEASE
            - DOCUMENTATION
      workflows:
        RELEASE:
          - name: On internal release
            nodes:
              - id: notification
                executorId: notification
                data:
                  channel: slack
                  channelConfig:
                    channel: '#internal-releases'
                    type: 'SUCCESS'
                  template: |
                    Yontrack ${build} has been released.
      
                    ${promotionRun.changelog?title=true&commitsOption=ALWAYS}
              - id: docs.yontrack.com
                executorId: notification
                data:
                  channel: github-workflow
                  channelConfig:
                    config: github.com
                    owner: yontrack
                    repository: doc.yontrack.com
                    workflowId: doc.yml
                    reference: main
                    callMode: ASYNC
      notificationsConfig:
        notifications:
          - name: On validation error
            events:
              - new_validation_run
            keywords: failed
            channel: slack
            channelConfig:
              channel: '#notifications'
              type: 'ERROR'
            contentTemplate: |
              Build ${build} has failed on ${validationStamp}.
          - name: On BRONZE
            promotion: BRONZE
            events:
              - new_promotion_run
            channel: slack
            channelConfig:
              channel: '#notifications'
              type: 'SUCCESS'
            contentTemplate: |
              Build ${build} has been promoted to ${promotionLevel}.
    project:
      environments:
        environments:
          - name: self.dev.yontrack.com
            order: 100
            tags:
              - release
        slots:
          - project: ontrack
            environments:
              - name: self.dev.yontrack.com
                admissionRules:
                  - name: "branchPattern"
                    ruleId: "branchPattern"
                    ruleConfig:
                      includes:
                        - "main"
                      lastBranchOnly: true
                  - name: "promotion"
                    ruleId: "promotion"
                    ruleConfig:
                      promotion: "RELEASE"
                workflows:
                  - trigger: "RUNNING"
                    name: "Deploying"
                    nodes:
                      - id: "auto-versioning"
                        description: "Updating version"
                        executorId: "auto-versioning"
                        data:
                          targetProject: "yontrack-infra-gitops"
                          targetBranch: "main"
                          targetPath: "yontrack-helmfile.d/values/yontrack-self/yontrack.yaml"
                          targetPropertyType: "yaml-path"
                          targetProperty: "image.tag"
                          targetVersion: "${build}"
                          autoApproval: true
                      - id: "deploy"
                        description: "Marking the deployment as finished"
                        executorId: "slot-pipeline-deployed"
                        data: {}
                        parents:
                          - id: "auto-versioning"
                      - id: "end"
                        parents:
                          - id: "deploy"
                        description: "Notification"
                        executorId: "notification"
                        data:
                          channel: "slack"
                          template: "Deployment of ${build} in Production is finished"
                          channelConfig:
                            type: "INFO"
                            channel: "#notifications"
  custom:
    configs:
      - conditions:
          - name: environment-regex
            config:
              name: VERSION
              regex: '\d+\.\d+\.\d+'
        branch:
          notificationsConfig:
            notifications:
            - name: On RELEASE
              promotion: RELEASE
              events:
                - new_promotion_run
              channel: slack
              channelConfig:
                channel: '#releases'
                type: 'SUCCESS'
              contentTemplate: |
                Yontrack ${build} has been released.

                ${promotionRun.changelog?title=true&commitsOption=OPTIONAL}
